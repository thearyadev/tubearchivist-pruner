name: docker build and push

on:
  release:
    types: [published]

permissions:
  actions: read
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract and manipulate tag name
        id: extract_tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          CLEAN_TAG_NAME=${TAG_NAME#v}
          TAG_SHA=$(git rev-list -n 1 "$TAG_NAME")
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "CLEAN_TAG_NAME=${CLEAN_TAG_NAME}" >> $GITHUB_ENV
          echo "TAG_SHA=${TAG_SHA}" >> $GITHUB_ENV

      - name: Find matching build workflow run
        id: find_build
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = process.env.TAG_SHA;
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yaml',
              branch: 'main',
              event: 'push',
              per_page: 100,
            });

            const run = data.workflow_runs.find(
              workflowRun =>
                workflowRun.head_sha === headSha &&
                workflowRun.conclusion === 'success'
            );

            if (!run) {
              core.setFailed(`No successful build workflow run found for ${headSha}`);
              return;
            }

            core.setOutput('run_id', run.id.toString());

      - name: Download cached image artifact
        uses: actions/download-artifact@v4
        with:
          name: tubearchivist-pruner-image-${{ env.TAG_SHA }}
          path: ${{ runner.temp }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find_build.outputs.run_id }}

      - name: Load cached image
        run: docker load --input "${{ runner.temp }}/tubearchivist-pruner.tar"

      - name: Tag and push image
        run: |
          docker tag tubearchivist-pruner:${TAG_SHA} thearyadev0/tubearchivist-pruner:latest
          docker tag tubearchivist-pruner:${TAG_SHA} thearyadev0/tubearchivist-pruner:${CLEAN_TAG_NAME}
          docker push thearyadev0/tubearchivist-pruner:latest
          docker push thearyadev0/tubearchivist-pruner:${CLEAN_TAG_NAME}
